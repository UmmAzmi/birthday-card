<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  padding: 20px;

  background: linear-gradient(-45deg,#353B56,#7D7585,#FBB45E,#C99379,#251211);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Georgia, serif;
  overflow-x: hidden;
}

.birthday {
  width: 100%;
  max-width: 500px;
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 { font-size: clamp(22px,5vw,32px); color:#632024; }
p { font-size: clamp(16px,4vw,20px); color:#852E47; }

#button {
  width:100%;
  max-width:300px;
  padding:12px;
  margin:20px auto;
  background:#FBB45E;
  color:#7D7585;
  border:none;
  border-radius:25px;
  font-size:18px;
  cursor:pointer;
}

/* лепестки */
.petal {
  position: fixed;
  top: -30px;
  pointer-events: none;
  animation: fall linear forwards;
}

.petal svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 8px rgba(255,120,150,0.9));
}

@keyframes fall {
  0% { transform: translateY(0); }
  100% { transform: translateY(110vh); }
}

/* капибара */
.capybara {
  position: fixed;
  bottom: 20px;
  left: -200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: left 2s ease;
  z-index: 10;
}

.capybara img { width: 120px; }

.capybara.show {
  left: 50%;
  transform: translateX(-50%);
}

.capybara.hide {
  left: 110%;
}

/* салют */
.firework {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  pointer-events: none;
  animation: explode 1.8s ease-out forwards;
  box-shadow: 0 0 10px currentColor;
}

@keyframes explode {
  100% {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}

/* финальная надпись */
.final-text {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 38px;
  color: white;
  text-align: center;
  opacity: 0;
  transition: 1s;
  z-index: 20;
}

.final-text.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

@keyframes gradientMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
</style>
</head>

<body>

<div id="player" style="display:none;"></div>

<div class="birthday"> 
  <h1>Аня, С Днем Рождения! 🎉</h1>
  <button id="button">Нажми сюда 💖</button>

  <p>Счастья, здоровья, успехов, благополучия,</p>
  <p>мира и добра.</p>
  <p>Пусть каждый день приносит новые возможности.</p> 
  <p>Пусть жизнь будет полна радости и приятных моментов!</p>
</div>

<div class="capybara">
  <img src="https://tse1.explicit.bing.net/th/id/OIP.YJ0_47EZIK9syjif-OqV6AHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
</div>

<div class="final-text">С ДНЁМ РОЖДЕНИЯ 💖</div>

<script>
// кнопка
const button = document.getElementById('button');

// YouTube
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

let player;
window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: 'wnmss7h5g9Y'
  });
};

// клик
button.addEventListener('click', function() {

  if (player) player.playVideo();

  // лепестки
  for (let i = 0; i < 60; i++) {
    const petal = document.createElement('div');
    petal.classList.add('petal');

    petal.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8 6,4 10,6 15c2 5,8 7,10 3s-1-9-4-16z" fill="pink"/>
      </svg>
    `;

    petal.style.left = Math.random() * window.innerWidth + 'px';
    petal.style.animationDuration = (Math.random()*3+4)+'s';
    petal.style.width = '15px';
    petal.style.height = '15px';

    document.body.appendChild(petal);
    petal.addEventListener('animationend', () => petal.remove());
  }

  // капибара
  setTimeout(() => {
    const c = document.querySelector('.capybara');
    c.classList.add('show');

    setTimeout(() => {
      c.classList.remove('show');
      c.classList.add('hide');
    }, 3000);

  }, 2500);

  // салют
  setTimeout(() => {
    let count = 0;

    const interval = setInterval(() => {
      launchFireworks();
      count++;
      if (count >= 4) clearInterval(interval);
    }, 800);

  }, 6000);

  // надпись
  setTimeout(() => {
    document.querySelector('.final-text').classList.add('show');
  }, 7500);

});

// функции салюта
function launchFireworks() {
  const rect = document.querySelector('.birthday').getBoundingClientRect();

  for (let i = 0; i < 8; i++) {
    createExplosion(
      rect.left + rect.width * Math.random(),
      rect.top + rect.height * Math.random()
    );
  }
}

function createExplosion(x, y) {
  const colors = ['#ff4d6d','#ffd166','#06d6a0','#4cc9f0','#c77dff'];

  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.classList.add('firework');

    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];

    const angle = Math.random()*2*Math.PI;
    const dist = Math.random()*120+60;

    p.style.setProperty('--x', Math.cos(angle)*dist+'px');
    p.style.setProperty('--y', Math.sin(angle)*dist+'px');

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1800);
  }
}
</script>

</body>
</html>
